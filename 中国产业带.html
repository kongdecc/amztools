    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #1d1f24;
        --muted: #6b7280;
        --border: #e6e9f0;
        --accent: #ff7a2f;
        --accent-soft: #fff2ea;
        --shadow: 0 10px 30px rgba(22, 27, 45, 0.08);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
        padding-top: 3.5rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 20px 60px;
        width: 100%;
        flex: 1;
      }
      .hero {
        background: linear-gradient(135deg, #ffffff 0%, #f9fafc 100%);
        border-radius: 24px;
        padding: 18px 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }
      .hero-top {
        display: flex;
        flex-wrap: wrap;
        gap: 16px 28px;
        align-items: center;
        justify-content: space-between;
      }
      .hero-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .hero-subtitle {
        color: var(--muted);
        margin-top: 6px;
        font-size: 12px;
      }
      .hero-actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 8px;
        min-width: 420px;
      }
      .input, .select, .button {
        height: 36px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        padding: 0 12px;
        font-size: 13px;
        color: var(--text);
      }
      .input {
        min-width: 200px;
      }
      .button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 0 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .button.secondary {
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .stats {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 12px;
      }
      .stats span {
        background: var(--accent-soft);
        color: #b55317;
        border-radius: 999px;
        padding: 6px 12px;
        font-weight: 600;
      }
      .section {
        margin-top: 26px;
        display: grid;
        gap: 18px;
      }
      .province-card {
        background: var(--card);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        padding: 20px 22px;
      }
      .province-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .province-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .province-pill {
        background: var(--accent);
        color: #fff;
        border-radius: 12px;
        padding: 6px 14px;
        font-weight: 700;
        font-size: 15px;
      }
      .province-meta {
        color: var(--muted);
        font-size: 13px;
      }
      .back-link {
        text-decoration: none;
        font-size: 12px;
        color: var(--accent);
        background: #fff7f1;
        border: 1px solid #ffd9c3;
        padding: 6px 12px;
        border-radius: 999px;
        white-space: nowrap;
      }
      #filterBar {
        scroll-margin-top: 24px;
      }
      .belt-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      .belt-item {
        padding: 14px 14px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #fcfdff;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 120px;
      }
      .belt-title {
        color: var(--accent);
        font-weight: 700;
        font-size: 14px;
      }
      .belt-desc {
        color: #4b5563;
        font-size: 13px;
        line-height: 1.5;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag {
        background: #f1f5f9;
        color: #3f4b5b;
        font-size: 11px;
        border-radius: 999px;
        padding: 4px 8px;
      }
      .highlight {
        background: var(--accent-soft);
        color: #b55317;
        padding: 0 2px;
        border-radius: 4px;
      }
      .empty {
        text-align: center;
        padding: 40px 12px;
        color: var(--muted);
        font-size: 14px;
        background: var(--card);
        border-radius: 18px;
        border: 1px dashed var(--border);
      }
      .tb-header { height: 3.5rem; background-color: #5b5bd6; color: white; display: flex; align-items: center; padding: 0 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; font-family: system-ui, -apple-system, sans-serif; justify-content: space-between; }
      @media (min-width: 768px) { .tb-header { padding: 0 2.5rem; justify-content: flex-start; } }
      .tb-logo-area { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1.125rem; min-width: 0; flex: 1; }
      @media (min-width: 768px) { .tb-logo-area { flex: initial; margin-right: 1.5rem; } }
      .tb-logo-icon { background-color: rgba(255,255,255,0.2); padding: 0.25rem; border-radius: 0.25rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
      .tb-nav-desktop { display: none; margin-left: auto; align-items: center; gap: 1.5rem; flex-shrink: 0; }
      @media (min-width: 768px) { .tb-nav-desktop { display: flex; } }
      .tb-nav-link { font-size: 0.875rem; color: rgba(255,255,255,0.9); text-decoration: none; display: flex; align-items: center; gap: 0.25rem; cursor: pointer; background: none; border: none; padding: 0; }
      .tb-nav-link:hover { color: white; }
      .tb-mobile-toggle { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; flex-shrink: 0; }
      @media (min-width: 768px) { .tb-mobile-toggle { display: none; } }
      .tb-btn-icon { padding: 0.5rem; border-radius: 0.25rem; background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .tb-btn-icon:hover { background-color: rgba(255,255,255,0.1); }
      .tb-mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
      .tb-mobile-overlay.open { display: block; }
      .tb-mobile-menu { position: fixed; top: 0; right: 0; bottom: 0; width: 16rem; background: white; z-index: 2001; transform: translateX(100%); transition: transform 0.3s ease-in-out; padding: 1.5rem; overflow-y: auto; color: #1f2937; }
      .tb-mobile-menu.open { transform: translateX(0); }

      @media (max-width: 720px) {
        .hero-top {

          align-items: flex-start;
        }
        .hero-actions {
          width: 100%;
          min-width: 0;
          grid-template-columns: 1fr;
        }
        .input, .select, .button {
          width: 100%;
        }
        .back-link {
          padding: 6px 10px;
        }
      }
    </style>

          opt.value = region;
          opt.textContent = region;
          regionSelect.appendChild(opt);
        });
        const provinceOption = document.createElement("option");
        provinceOption.value = "";
        provinceOption.textContent = "全部省份/自治区";
        provinceSelect.appendChild(provinceOption);
        rawData.forEach((item) => {
          const opt = document.createElement("option");
          opt.value = item.province;
          opt.textContent = item.province;
          provinceSelect.appendChild(opt);
        });
        const tagOption = document.createElement("option");
        tagOption.value = "";
        tagOption.textContent = "全部产业类型";
        tagSelect.appendChild(tagOption);
        tagRules.forEach((rule) => {
          const opt = document.createElement("option");
          opt.value = rule.tag;
          opt.textContent = rule.tag;
          tagSelect.appendChild(opt);
        });
        const cityOption = document.createElement("option");
        cityOption.value = "";
        cityOption.textContent = "全部产业带";
        citySelect.appendChild(cityOption);
        const cityNames = Array.from(new Set(allBelts.map((belt) => belt.name))).sort((a, b) => a.localeCompare(b, "zh-CN"));
        cityNames.forEach((name) => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          citySelect.appendChild(opt);
        });
      };

      const highlightText = (text, keyword) => {
        if (!keyword) {
          return text;
        }
        const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return text.replace(new RegExp(escaped, "gi"), (match) => `<span class="highlight">${match}</span>`);
      };

      const render = () => {
        const keyword = keywordInput.value.trim();
        const regionFilter = regionSelect.value;
        const provinceFilter = provinceSelect.value;
        const tagFilter = tagSelect.value;
        const cityFilter = citySelect.value;
        let activeItems = 0;
        listSection.innerHTML = "";
        const fragments = document.createDocumentFragment();
        rawData.forEach((province) => {
          const filteredBelts = province.belts
            .map((belt) => {
              const text = `${province.province}${belt.name}${belt.desc}`;
              const tags = deriveTags(text);
              return { ...belt, tags, text };
            })
            .filter((belt) => {
              const hitKeyword = keyword === "" || belt.text.includes(keyword);
              const hitRegion = regionFilter === "" || provinceToRegion[province.province] === regionFilter;
              const hitProvince = provinceFilter === "" || province.province === provinceFilter;
              const hitTag = tagFilter === "" || belt.tags.includes(tagFilter);
              const hitCity = cityFilter === "" || belt.name === cityFilter;
              return hitKeyword && hitRegion && hitProvince && hitTag && hitCity;
            });
          if (filteredBelts.length === 0) {
            return;
          }
          activeItems += filteredBelts.length;
          const card = document.createElement("div");
          card.className = "province-card";
          const head = document.createElement("div");
          head.className = "province-head";
          const info = document.createElement("div");
          info.className = "province-info";
          const pill = document.createElement("div");
          pill.className = "province-pill";
          pill.textContent = province.province;
          const meta = document.createElement("div");
          meta.className = "province-meta";
          meta.textContent = `共 ${filteredBelts.length} 个产业带`;
          info.appendChild(pill);
          info.appendChild(meta);
          const back = document.createElement("a");
          back.className = "back-link";
          back.href = "#filterBar";
          back.textContent = "回到筛选";
          head.appendChild(info);
          head.appendChild(back);
          const grid = document.createElement("div");
          grid.className = "belt-grid";
          filteredBelts.forEach((belt) => {
            const item = document.createElement("div");
            item.className = "belt-item";
            const title = document.createElement("div");
            title.className = "belt-title";
            title.innerHTML = highlightText(belt.name, keyword);
            const desc = document.createElement("div");
            desc.className = "belt-desc";
            desc.innerHTML = highlightText(belt.desc, keyword);
            const tagWrap = document.createElement("div");
            tagWrap.className = "tags";
            belt.tags.forEach((tag) => {
              const tagNode = document.createElement("span");
              tagNode.className = "tag";
              tagNode.textContent = tag;
              tagWrap.appendChild(tagNode);
            });
            item.appendChild(title);
            item.appendChild(desc);
            if (belt.tags.length > 0) {
              item.appendChild(tagWrap);
            }
            grid.appendChild(item);
          });
          card.appendChild(head);
          card.appendChild(grid);
          fragments.appendChild(card);
        });
        if (activeItems === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "未找到匹配的产业带，请尝试调整筛选条件。";
          listSection.appendChild(empty);
        } else {
          listSection.appendChild(fragments);
        }
        activeCount.textContent = `${activeItems} 条结果`;
      };

      const updateStats = () => {
        beltCount.textContent = `${allBelts.length} 个产业带`;
        provinceCount.textContent = `${rawData.length} 个省份/自治区`;
      };

      keywordInput.addEventListener("input", render);
      regionSelect.addEventListener("change", render);
      provinceSelect.addEventListener("change", render);
      tagSelect.addEventListener("change", render);
      citySelect.addEventListener("change", render);
      resetBtn.addEventListener("click", () => {
        keywordInput.value = "";
        regionSelect.value = "";
        provinceSelect.value = "";
        tagSelect.value = "";
        citySelect.value = "";
        render();
      });

      buildSelectOptions();
      updateStats();
      render();

      const mobileMenuBtn = document.getElementById("mobileMenuBtn");
      const closeMobileBtn = document.getElementById("closeMobileBtn");
      const mobileOverlay = document.getElementById("mobileOverlay");
      const mobileMenu = document.getElementById("mobileMenu");

      const toggleMobileMenu = () => {
        const isOpen = mobileMenu.classList.contains("open");
        if (isOpen) {
          mobileMenu.classList.remove("open");
          mobileOverlay.classList.remove("open");
          document.body.style.overflow = "";
        } else {
          mobileMenu.classList.add("open");
          mobileOverlay.classList.add("open");
          document.body.style.overflow = "hidden";
        }
      };

      if (mobileMenuBtn) mobileMenuBtn.addEventListener("click", toggleMobileMenu);
      if (closeMobileBtn) closeMobileBtn.addEventListener("click", toggleMobileMenu);
      if (mobileOverlay) mobileOverlay.addEventListener("click", toggleMobileMenu);
    </script>
  </body>
</html>
