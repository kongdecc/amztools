<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>亚马逊批量广告表格生成器</title>
    <style>
      :root {
        color-scheme: light;
        --shell-bg: #f4f7fb;
        --shell-card: #ffffff;
        --shell-border: #e2e8f0;
        --shell-text: #111827;
        --shell-muted: #64748b;
        --shell-brand: #5b5bd6;
        --shell-brand-dark: #4b4bb8;
        --shell-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fbff 0%, #f4f7fb 100%);
        color: var(--shell-text);
        padding-top: 3.5rem;
        font-family:
          "IBM Plex Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          sans-serif;
      }

      .tb-header {
        height: 3.5rem;
        background-color: var(--shell-brand);
        color: white;
        display: flex;
        align-items: center;
        padding: 0 1rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        justify-content: space-between;
      }

      @media (min-width: 768px) {
        .tb-header {
          padding: 0 2.5rem;
          justify-content: flex-start;
        }
      }

      .tb-logo-area {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 700;
        font-size: 1.125rem;
        min-width: 0;
        flex: 1;
      }

      @media (min-width: 768px) {
        .tb-logo-area {
          flex: initial;
          margin-right: 1.5rem;
        }
      }

      .tb-logo-icon {
        background-color: rgba(255, 255, 255, 0.2);
        padding: 0.25rem;
        border-radius: 0.25rem;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tb-nav-desktop {
        display: none;
        margin-left: auto;
        align-items: center;
        gap: 1.5rem;
        flex-shrink: 0;
      }

      @media (min-width: 768px) {
        .tb-nav-desktop {
          display: flex;
        }
      }

      .tb-nav-link {
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .tb-nav-link:hover {
        color: white;
      }

      .tb-mobile-toggle {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-left: auto;
        flex-shrink: 0;
      }

      @media (min-width: 768px) {
        .tb-mobile-toggle {
          display: none;
        }
      }

      .tb-btn-icon {
        padding: 0.5rem;
        border-radius: 0.25rem;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tb-btn-icon:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }

      .tb-mobile-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        z-index: 2000;
        display: none;
      }

      .tb-mobile-overlay.open {
        display: block;
      }

      .tb-mobile-menu {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 16rem;
        background: white;
        z-index: 2001;
        transform: translateX(100%);
        transition: transform 0.25s ease-in-out;
        padding: 1.5rem;
        overflow-y: auto;
        color: #1f2937;
      }

      .tb-mobile-menu.open {
        transform: translateX(0);
      }

      .tb-mobile-nav-item {
        display: block;
        padding: 0.875rem 0;
        font-size: 1rem;
        font-weight: 500;
        color: #374151;
        text-decoration: none;
        border-bottom: 1px solid #f1f5f9;
      }

      .page-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .tool-stage {
        width: 100%;
        flex: 1;
      }

      #root {
        min-height: calc(100vh - 3.5rem);
      }

      .site-footer {
        text-align: center;
        padding: 1.5rem 1rem;
        font-size: 0.75rem;
        color: #94a3b8;
        background-color: #f8fafc;
        border-top: 1px solid #e2e8f0;
      }

      .site-footer a {
        color: inherit;
        text-decoration: none;
      }

      body.embedded .tb-header,
      body.embedded .tb-mobile-overlay,
      body.embedded .tb-mobile-menu {
        display: none !important;
      }

      body.embedded .page-shell {
        min-height: 100vh;
      }

      body.embedded {
        padding-top: 0;
      }

      body.embedded #root {
        min-height: 100vh;
      }

    </style>
  </head>
  <body>
    <div id="site-header-container">
      <div class="tb-header">
        <div class="tb-logo-area">
          <div class="tb-logo-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="7" height="9" x="3" y="3" rx="1"></rect>
              <rect width="7" height="5" x="14" y="3" rx="1"></rect>
              <rect width="7" height="9" x="14" y="12" rx="1"></rect>
              <rect width="7" height="5" x="3" y="16" rx="1"></rect>
            </svg>
          </div>
          <span>跨境工具魔方 AmzToolBox</span>
        </div>
        <nav class="tb-nav-desktop">
          <a href="/" class="tb-nav-link">首页</a>
          <a href="/functionality" class="tb-nav-link">功能分类</a>
          <a href="/about" class="tb-nav-link">关于</a>
          <a href="/blog" class="tb-nav-link">博客</a>
          <a href="/suggest" class="tb-nav-link">提需求</a>
          <a href="/reward" class="tb-nav-link">打赏支持</a>
        </nav>
        <div class="tb-mobile-toggle">
          <button id="mobileMenuBtn" class="tb-btn-icon" aria-label="打开菜单">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="4" x2="20" y1="12" y2="12"></line>
              <line x1="4" x2="20" y1="6" y2="6"></line>
              <line x1="4" x2="20" y1="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="tb-mobile-overlay" id="mobileOverlay"></div>
      <div class="tb-mobile-menu" id="mobileMenu">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem">
          <span style="font-weight: 700; font-size: 1.25rem">跨境工具魔方 AmzToolBox</span>
          <button
            id="closeMobileBtn"
            style="background: none; border: none; padding: 0.5rem; cursor: pointer"
            aria-label="关闭菜单"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <a href="/" class="tb-mobile-nav-item">首页</a>
        <a href="/functionality" class="tb-mobile-nav-item">功能分类</a>
        <a href="/about" class="tb-mobile-nav-item">关于</a>
        <a href="/blog" class="tb-mobile-nav-item">博客</a>
        <a href="/suggest" class="tb-mobile-nav-item">提需求</a>
        <a href="/reward" class="tb-mobile-nav-item">打赏支持</a>
      </div>
    </div>

    <div class="page-shell">
      <main class="tool-stage">
        <div id="root"></div>
      </main>

      <footer class="site-footer">
        © 2025 跨境工具魔方 AmzToolBox. All rights reserved.
        <span style="margin: 0 0.5rem">|</span>
        <a href="/privacy">隐私说明</a>
      </footer>
    </div>

    <script>
      if (window.self !== window.top) {
        document.body.classList.add("embedded");
      }

      const mobileMenuBtn = document.getElementById("mobileMenuBtn");
      const closeMobileBtn = document.getElementById("closeMobileBtn");
      const mobileOverlay = document.getElementById("mobileOverlay");
      const mobileMenu = document.getElementById("mobileMenu");

      function setMobileMenuOpen(open) {
        if (!mobileOverlay || !mobileMenu) return;
        mobileOverlay.classList.toggle("open", open);
        mobileMenu.classList.toggle("open", open);
      }

      if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener("click", () => setMobileMenuOpen(true));
      }
      if (closeMobileBtn) {
        closeMobileBtn.addEventListener("click", () => setMobileMenuOpen(false));
      }
      if (mobileOverlay) {
        mobileOverlay.addEventListener("click", () => setMobileMenuOpen(false));
      }
    </script>
    <script>
      window.TOP_AD_OPTIONS = {
        insertAfterSelector: "#site-header-container",
        hideWhenEmbedded: true,
      };
      const sharedTopAdScript = document.createElement("script");
      sharedTopAdScript.src = "./shared-top-ad.js";
      document.body.appendChild(sharedTopAdScript);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
